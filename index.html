function mkSlots(){
  const r=[];
  for(let i=0;i<32;i++){const m=6*60+i*30,h=Math.floor(m/60),mn=m%60;r.push({l:`${String(h).padStart(2,'0')}:${mn?'30':'00'}`,hr:mn===0});}
  return r;
}

function positionTabs(){
  const sz=SZ[curSz];
  const mmToPx=3.7795; // 1mm = 3.7795px at 96dpi
  const pageHmm=parseFloat(sz.ph);
  const hlHmm=parseFloat(sz.hlH)||28;
  const pmMm=parseFloat(sz.pm);
  // usable vertical space below headline
  const usableMm=pageHmm - hlHmm - 4; // 4mm bottom margin
  const n=DAYS.length; // 7
  const stepMm=usableMm/n;
  const tabHmm=Math.min(parseFloat(sz.tabH), stepMm-1);

  pages.forEach((p,idx)=>{
    const tab=p.querySelector(`#tab-${idx}`);
    if(!tab) return;
    const topMm=hlHmm + idx*stepMm;
    tab.style.top=`${topMm}mm`;
    tab.style.height=`${tabHmm}mm`;
  });
}

function build(sz){
  const pc=document.getElementById('pc'),dj=document.getElementById('dj');
  pc.innerHTML='';dj.innerHTML='';pages=[];
  DAYS.forEach((dow,idx)=>{
    const p=mkPage(dow,idx,sz);
    pc.appendChild(p);pages.push(p);
    const o=document.createElement('option');o.value=idx;o.textContent=DNS[dow];dj.appendChild(o);
  });
  setTimeout(positionTabs,100);
}

function setSize(s){curSz=s;build(SZ[s]);show(cur);}
function show(n){
  pages.forEach(p=>p.classList.remove('active'));
  pages[n].classList.add('active');
  document.getElementById('pi').textContent=`${n+1} / ${pages.length}`;
  document.getElementById('dj').value=n;
  setTimeout(scaleFit,50);
}
function next(){cur=Math.min(cur+1,pages.length-1);show(cur);}
function prev(){cur=Math.max(cur-1,0);show(cur);}
function jump(v){cur=parseInt(v);show(cur);}
function clearPg(){
  const p=pages[cur];
  p.querySelectorAll('input[type=text]').forEach(e=>e.value='');
  p.querySelectorAll('input[type=checkbox]').forEach(e=>e.checked=false);
  p.querySelectorAll('[contenteditable]').forEach(e=>e.textContent='');
  p.querySelectorAll('.en-c').forEach(c=>{c.style.background='transparent';c.style.borderColor='#bbb';});
  p.querySelectorAll('.mood-f,.mc,.dn').forEach(x=>x.classList.remove('on'));
}


function collectState(){
  const state={sz:curSz,pages:[]};
  pages.forEach((p)=>{
    const pg={texts:[],checks:[],editables:[],energy:0,mood:null,month:null,day:null};
    p.querySelectorAll('input[type=text]').forEach(e=>pg.texts.push(e.value));
    p.querySelectorAll('input[type=checkbox]').forEach(e=>pg.checks.push(e.checked));
    p.querySelectorAll('[contenteditable]').forEach(e=>pg.editables.push(e.textContent));
    p.querySelectorAll('.en-c').forEach((c,i)=>{if(c.style.background==='rgb(119, 119, 119)')pg.energy=i+1;});
    p.querySelectorAll('.mood-f').forEach((f,i)=>{if(f.classList.contains('on'))pg.mood=i;});
    p.querySelectorAll('.mc').forEach((m,i)=>{if(m.classList.contains('on'))pg.month=i;});
    p.querySelectorAll('.dn').forEach((d,i)=>{if(d.classList.contains('on'))pg.day=i;});
    state.pages.push(pg);
  });
  return state;
}

function applyState(state){
  if(!state) return;
  state.pages.forEach((pg,idx)=>{
    if(!pages[idx]) return;
    const p=pages[idx];
    const texts=p.querySelectorAll('input[type=text]');
    pg.texts.forEach((v,i)=>{if(texts[i])texts[i].value=v;});
    const checks=p.querySelectorAll('input[type=checkbox]');
    pg.checks.forEach((v,i)=>{if(checks[i])checks[i].checked=v;});
    const edits=p.querySelectorAll('[contenteditable]');
    pg.editables.forEach((v,i)=>{if(edits[i])edits[i].textContent=v;});
    if(pg.energy){p.querySelectorAll('.en-c').forEach((c,i)=>{c.style.background=i<pg.energy?'#777':'transparent';c.style.borderColor=i<pg.energy?'#666':'#bbb';});}
    if(pg.mood!==null){const mfs=p.querySelectorAll('.mood-f');mfs.forEach(f=>f.classList.remove('on'));if(mfs[pg.mood])mfs[pg.mood].classList.add('on');}
    if(pg.month!==null){const mcs=p.querySelectorAll('.mc');mcs.forEach(m=>m.classList.remove('on'));if(mcs[pg.month])mcs[pg.month].classList.add('on');}
    if(pg.day!==null){const dns=p.querySelectorAll('.dn');dns.forEach(d=>d.classList.remove('on'));if(dns[pg.day])dns[pg.day].classList.add('on');}
  });
}



function exportJSON(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(collectState(),null,2));
  a.download='horario_boxa_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importJSON(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const state=JSON.parse(e.target.result);
      applyState(state);
      localStorage.setItem(STORE_KEY,JSON.stringify(state));
      const ind=document.getElementById('save-ind');ind.style.opacity='1';setTimeout(()=>ind.style.opacity='0',1800);
    }catch(err){alert('Archivo inválido.');}
  };
  reader.readAsText(file);evt.target.value='';
}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass-vis').value;
  const isLogin=document.getElementById('tab-login').classList.contains('on');
  if(!email||!pass){setMsg('Completá email y contraseña');return;}
  const btn=document.getElementById('auth-btn');
  btn.textContent='…';btn.disabled=true;
  if(isLogin){
    const{data,error}=await supa.auth.signInWithPassword({email,password:pass});
    if(error){setMsg('Email o contraseña incorrectos');resetBtn('Ingresar');}
    else await enterApp(data.user);
  } else {
    const{data,error}=await supa.auth.signUp({email,password:pass});
    if(error){setMsg(error.message);resetBtn('Crear cuenta');}
    else if(data.user){
      setMsg('Cuenta creada — ingresando…',true);
      await enterApp(data.user);
    } else {
      setMsg('Revisá tu email para confirmar',true);
      switchTab('login');
    }
  }
}

// ── ENTER APP ────────────────────────────────────────────────
async function enterApp(user){
  _user=user;
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-lbl').textContent=user.email;
  // build planilla once
  if(!_appBuilt){
    build(SZ['a5']);show(0);
    _appBuilt=true;
    await new Promise(r=>setTimeout(r,300));
  }
  // load data: cloud first, then localStorage
  const cloud=await cloudLoad();
  if(cloud){
    applyState(cloud);
    try{localStorage.setItem(STORE_KEY,JSON.stringify(cloud));}catch(e){}
  } else {
    try{const s=localStorage.getItem(STORE_KEY);if(s)applyState(JSON.parse(s));}catch(e){}
  }
  wireInputs();
  scaleFit();
}

// ── CLOUD ────────────────────────────────────────────────────
async function cloudLoad(){
  if(!_user) return null;
  try{
    const{data,error}=await supa
      .from('horario')
      .select('data')
      .eq('user_id',_user.id)
      .maybeSingle();
    if(error){console.warn('cloudLoad',error);return null;}
    return data?.data||null;
  }catch(e){return null;}
}

async function cloudSave(state){
  if(!_user) return;
  try{
    // delete existing row then insert fresh
    await supa.from('horario').delete().eq('user_id',_user.id);
    await supa.from('horario').insert({user_id:_user.id,data:state,updated_at:new Date().toISOString()});
  }catch(e){console.warn('cloudSave',e);}
}

// ── SAVE (local + cloud) ─────────────────────────────────────
function triggerSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const state=collectState();
    try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}
    cloudSave(state);
    const ind=document.getElementById('save-ind');
    ind.style.opacity='1';
    setTimeout(()=>ind.style.opacity='0',1600);
  },800);
}

function wireInputs(){
  // Use document-level delegation so it works regardless of when #pc is populated
  if(window._wiresDone) return;
  window._wiresDone=true;
  document.addEventListener('input',e=>{
    if(e.target.closest('#pc')) triggerSave();
  },{passive:true});
  document.addEventListener('change',e=>{
    if(e.target.closest('#pc')) triggerSave();
  },{passive:true});
  document.addEventListener('click',e=>{
    if(e.target.closest('#pc')&&e.target.matches('.en-c,.mood-f,.mc,.dn')) triggerSave();
  },{passive:true});
}

// ── MOBILE SCALE ─────────────────────────────────────────────
function scaleFit(){
  const vw=window.innerWidth;
  const activePage=pages[cur];
  if(!activePage) return;
  if(vw>=660){
    activePage.style.transform='';
    activePage.style.marginBottom='';
    return;
  }
  const pw=activePage.scrollWidth||560;
  const scale=(vw-16)/pw;
  activePage.style.transform=`scale(${scale})`;
  activePage.style.transformOrigin='top left';
  activePage.style.marginLeft='8px';
  activePage.style.marginBottom=(activePage.offsetHeight*scale - activePage.offsetHeight)+'px';
}
window.addEventListener('resize',scaleFit,{passive:true});

// ── RESTORE SESSION ON LOAD ──────────────────────────────────
function showAuth(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

let _sessionChecked=false;
async function checkSession(){
  if(_sessionChecked) return;
  _sessionChecked=true;
  try{
    const{data:{session}}=await supa.auth.getSession();
    if(session?.user){
      await enterApp(session.user);
    } else {
      showAuth();
    }
  }catch(e){
    showAuth();
  }
}

// Primary: onAuthStateChange
supa.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session?.user){
    if(!_user) await enterApp(session.user);
  } else if(event==='SIGNED_OUT'){
    _user=null;
    showAuth();
  } else if(event==='INITIAL_SESSION'){
    if(!_sessionChecked){
      _sessionChecked=true;
      if(session?.user){
        await enterApp(session.user);
      } else {
        showAuth();
      }
    }
  }
});

// Backup: getSession after small delay to ensure client is ready
setTimeout(checkSession, 500);

// Hard fallback after 4s
setTimeout(()=>{
  if(!_sessionChecked) showAuth();
},4000);
